<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>นักสืบจิ๋วผีตาโขน - เกมทอยลูกเต๋า</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Sukhumvit Set', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #1e4b2e 0%, #0a2f1a 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* เกมหลัก */
        .game-container {
            max-width: 1400px;
            width: 100%;
            background: #fef3c7;
            background-image: radial-gradient(circle at 10% 20%, rgba(255,215,130,0.2) 2%, transparent 2.5%);
            background-size: 28px 28px;
            border-radius: 60px 60px 40px 40px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 4px rgba(255,255,200,0.8);
            padding: 20px;
            transition: all 0.2s;
        }
        /* header ผู้เล่น 4 คน */
        .players-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: space-between;
            margin-bottom: 25px;
            background: #4a2512c9;
            padding: 12px 20px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }
        .player-card {
            background: #fff6e0;
            border-radius: 40px;
            padding: 8px 18px;
            flex: 1;
            min-width: 150px;
            text-align: center;
            box-shadow: 0 5px 0 #b97f44;
            border: 2px solid #ffcd94;
            transition: 0.1s linear;
        }
        .player-card.active-turn {
            background: #ffecb3;
            box-shadow: 0 0 0 3px #f39c12, 0 5px 0 #b97f44;
            transform: scale(1.01);
        }
        .player-name {
            font-weight: bold;
            font-size: 1.2rem;
            color: #3b2a1f;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .avatar-icon {
            font-size: 1.7rem;
        }
        .player-score {
            font-size: 0.9rem;
            background: #ffda99;
            display: inline-block;
            padding: 2px 12px;
            border-radius: 30px;
            margin-top: 6px;
        }
        .player-position {
            font-size: 0.75rem;
            color: #784e2e;
        }
        /* แผนที่ 30 ช่อง */
        .board {
            background: #e9d6a7;
            padding: 20px 12px;
            border-radius: 70px;
            margin: 15px 0;
            box-shadow: inset 0 0 0 3px #fef0c0, inset 0 0 0 8px #cb9e6b, 0 10px 20px rgba(0,0,0,0.3);
        }
        .track {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }
        .cell {
            background: #fffaec;
            border-radius: 20px;
            text-align: center;
            padding: 12px 4px;
            font-size: 0.75rem;
            font-weight: bold;
            box-shadow: inset 0 -2px 0 #bbaa7a, 0 2px 5px rgba(0,0,0,0.2);
            position: relative;
            border: 1px solid #e7c68e;
            transition: 0.05s linear;
        }
        .cell span.number {
            font-size: 0.7rem;
            background: #d9c290;
            border-radius: 30px;
            padding: 0 5px;
            display: inline-block;
        }
        .avatars-on-cell {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 3px;
            margin-top: 6px;
            font-size: 1rem;
        }
        .green-cell { background: #c8e6b5; border-left: 6px solid #2e7d32; }
        .yellow-cell { background: #fff1b5; border-left: 6px solid #f9a825; }
        .red-cell { background: #ffcdb5; border-left: 6px solid #d32f2f; }
        .boss-cell { background: #e0b0ff; border-left: 6px solid #6a1b9a; }

        /* ควบคุมลูกเต๋า */
        .dice-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin: 15px 0;
            background: #5c351ee0;
            padding: 15px;
            border-radius: 60px;
        }
        .dice-btn {
            background: #f3a712;
            border: none;
            font-size: 2rem;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 6px 0 #8b5a2b;
            transition: 0.07s linear;
            color: #2c1a0c;
        }
        .dice-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #8b5a2b; }
        .dice-value {
            background: white;
            font-size: 3rem;
            font-weight: bold;
            width: 90px;
            text-align: center;
            border-radius: 30px;
            padding: 10px;
            font-family: monospace;
            box-shadow: inset 0 0 0 3px #ffbc6e;
        }
        /* modal คำถาม */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(3px);
        }
        .modal-card {
            background: #fff2db;
            max-width: 550px;
            width: 90%;
            border-radius: 50px;
            padding: 25px;
            border-top: 20px solid #ffaa44;
            box-shadow: 0 20px 30px black;
        }
        .question-text {
            font-size: 1.3rem;
            margin: 20px 0;
            line-height: 1.4;
        }
        .answer-input {
            width: 100%;
            padding: 12px;
            border-radius: 50px;
            border: 2px solid #e2b87a;
            font-size: 1rem;
            margin: 15px 0;
        }
        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: space-between;
        }
        .btn-submit, .btn-hint {
            background: #4c7a34;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-hint { background: #e67e22; }
        .attempt-hint { font-size: 0.8rem; color: #a55d1a; margin-top: 10px; }
        .close-icon { float: right; cursor: pointer; font-size: 1.6rem; }

        /* dashboard สรุปผล */
        .export-panel {
            margin-top: 20px;
            text-align: center;
            background: #2d2b1f;
            border-radius: 40px;
            padding: 8px;
        }
        .export-btn {
            background: #1f6392;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        .status-msg {
            background: #2c2b26;
            color: #ffdd99;
            border-radius: 30px;
            padding: 6px;
            text-align: center;
            font-size: 0.8rem;
        }
        button:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }
        @media (max-width: 700px) {
            .track { gap: 4px; }
            .cell { font-size: 0.6rem; padding: 6px 2px; }
            .player-card { min-width: 100px; }
        }
    </style>
</head>
<body>
<div class="game-container" id="gameApp">
    <!-- ผู้เล่น 4 คน -->
    <div class="players-panel" id="playersPanel"></div>
    <!-- กระดาน 30 ช่อง -->
    <div class="board" id="boardContainer"></div>
    <!-- ลูกเต๋า -->
    <div class="dice-area">
        <button class="dice-btn" id="rollDiceBtn">🎲 ทอยลูกเต๋า 🎲</button>
        <div class="dice-value" id="diceResult">0</div>
    </div>
    <div class="status-msg" id="gameStatusMsg">🎭 กดทอยลูกเต๋าเพื่อเริ่ม! 🎭</div>
    <div class="export-panel">
        <button class="export-btn" id="exportCSVBtn">📥 ส่งออกผลงาน (CSV)</button>
        <button class="export-btn" id="resetGameBtn" style="background:#8b3c1a;">🔄 เริ่มเกมใหม่</button>
    </div>
</div>
<script>
    // --------------------------------------------------------------
    // ข้อมูลการ์ดทั้ง 3 หมวด + การ์ดบอส
    // --------------------------------------------------------------
    const factOpinionCards = [
        { text: "ผีตาโขนเป็นการละเล่นพื้นบ้านของชาวอำเภอด่านซ้าย จังหวัดเลย", answerKeywords: ["ข้อเท็จจริง"] },
        { text: "ขบวนแห่ผีตาโขนเป็นเทศกาลที่สนุกและน่าตื่นเต้นที่สุดในโลก", answerKeywords: ["ข้อคิดเห็น"] },
        { text: "ส่วนหัวของหน้ากากผีตาโขนทำมาจากหวดนึ่งข้าวเก่า", answerKeywords: ["ข้อเท็จจริง"] },
        { text: "หน้ากากผีตาโขนที่วาดด้วยสีแดงดูน่ากลัวและมีมนต์ขลังกว่าสีอื่นๆ", answerKeywords: ["ข้อคิดเห็น"] },
        { text: "จมูกของหน้ากากผีตาโขนทำมาจากการนำไม้เนื้ออ่อนมาแกะสลัก", answerKeywords: ["ข้อเท็จจริง"] },
        { text: "ทุกคนที่ได้สวมหน้ากากผีตาโขนจะรู้สึกสนุกสนานและไม่เหนื่อยเลยทั้งวัน", answerKeywords: ["ข้อคิดเห็น"] },
        { text: "งานประเพณีบุญหลวงและการละเล่นผีตาโขนมักจัดขึ้นในช่วงเดือน 7 หรือเดือน 8 ของทุกปี", answerKeywords: ["ข้อเท็จจริง"] },
        { text: "ผีตาโขนต้องเป็นวิญญาณร้ายที่มาหลอกหลอนชาวบ้านแน่ๆ", answerKeywords: ["ข้อคิดเห็น"] },
        { text: "ส่วนใบหน้าของหน้ากากผีตาโขนทำมาจากการนำกาบมะพร้าวมาเจาะเป็นช่องตาและปาก", answerKeywords: ["ข้อเท็จจริง"] },
        { text: "ดนตรีที่ใช้บรรเลงในขบวนแห่ผีตาโขนมีความไพเราะกว่าดนตรีสากล", answerKeywords: ["ข้อคิดเห็น"] },
        { text: "ตำนานของการละเล่นผีตาโขนมีความเกี่ยวข้องกับเรื่องมหาเวสสันดรชาดก", answerKeywords: ["ข้อเท็จจริง"] },
        { text: "การใช้วัสดุธรรมชาติในการทำหน้ากาก ทำให้ชิ้นงานดูสวยงามที่สุด", answerKeywords: ["ข้อคิดเห็น"] },
        { text: "ในอดีต ชาวบ้านเรียกภูตผีและสัตว์ป่าที่เดินตามมาส่งเสด็จพระเวสสันดรว่า 'ผีตามคน'", answerKeywords: ["ข้อเท็จจริง"] },
        { text: "ขบวนแห่ผีตาโขนยิ่งใหญ่และอลังการกว่าขบวนแห่เทียนพรรษาแน่นอน", answerKeywords: ["ข้อคิดเห็น"] },
        { text: "ลุงมั่นคือนักทำหน้ากากผีตาโขนที่เก่งที่สุดในประเทศไทย", answerKeywords: ["ข้อคิดเห็น"] }
    ];
    const transformCards = [
        { rumor: "ส่วนหัวของหน้ากากผีตาโขนทำจากหม้อดินเผา", task: "ความจริงแล้วส่วนหัวทำมาจากอะไร?", keywords: ["หวด", "หวดนึ่งข้าว"] },
        { rumor: "ผีตาโขนคือวิญญาณร้ายที่ตั้งใจมาหลอกคน", task: "ความจริงแล้วภูตผีเดินตามพระเวสสันดรมาเพราะความรู้สึกใด?", keywords: ["ศรัทธา", "เคารพ"] },
        { rumor: "ประเพณีผีตาโขนจัดขึ้นที่จังหวัดเชียงใหม่", task: "ความจริงแล้วจัดขึ้นที่อำเภอและจังหวัดใด?", keywords: ["ด่านซ้าย", "เลย"] },
        { rumor: "จมูกผีตาโขนทำจากกระดาษม้วนยาวๆ", task: "ความจริงแล้วจมูกยาวโค้งทำมาจากอะไร?", keywords: ["ไม้", "ไม้เนื้ออ่อน"] },
        { rumor: "คำว่าผีตาโขน เพี้ยนมาจากคำว่า ผีตาโบ๋", task: "ความจริงแล้วเพี้ยนเสียงมาจากคำว่าอะไร?", keywords: ["ผีตามคน"] },
        { rumor: "งานผีตาโขนจัดขึ้นในฤดูหนาวเดือนธันวาคม", task: "ความจริงแล้วงานบุญหลวงมักจัดช่วงเดือนใด?", keywords: ["7", "8", "เจ็ด", "แปด"] },
        { rumor: "ผีตาโขนเป็นการละเล่นของภาคใต้", task: "ความจริงแล้วเป็นการละเล่นของภาคใดในไทย?", keywords: ["อีสาน", "ตะวันออกเฉียงเหนือ"] },
        { rumor: "ผีตาโขนมีต้นกำเนิดมาจากต่างประเทศ", task: "ความจริงแล้วมาจากนิทานชาดกเรื่องใด?", keywords: ["เวสสันดร", "มหาเวสสันดร"] },
        { rumor: "หน้ากากผีตาโขนต้องสั่งซื้อพลาสติกจากโรงงานเท่านั้น", task: "ความจริงแล้วชาวบ้านใช้วัสดุประเภทใดมาทำ?", keywords: ["ธรรมชาติ", "เหลือใช้", "ท้องถิ่น"] },
        { rumor: "ส่วนใบหน้าของผีตาโขนทำจากแผ่นเหล็กเจาะรู", task: "ความจริงแล้วส่วนใบหน้าทำมาจากอะไร?", keywords: ["กาบมะพร้าว"] }
    ];
    const bossCards = {
        10: { text: "ภารกิจ: นักสืบจงพิมพ์สร้างประโยค 'ข้อเท็จจริง' เกี่ยวกับ 'วัสดุที่ใช้ทำหน้ากากผีตาโขน' มาด้วยตนเอง 1 ประโยค", minLen: 20, requiredKeywords: ["หวด", "ไม้", "กาบมะพร้าว"], type: "boss" },
        20: { text: "ภารกิจ: นักสืบจงพิมพ์สร้างประโยค 'ข้อคิดเห็น' เกี่ยวกับ 'ความรู้สึกที่มีต่องานประเพณีผีตาโขน' มาด้วยตนเอง 1 ประโยค", minLen: 20, requiredKeywords: ["คิดว่า", "สนุก", "สวย", "น่าจะ", "อาจจะ"], type: "boss" },
        30: { text: "ภารกิจ: นักสืบจงพิมพ์สร้างประโยค 'ข้อเท็จจริง' เกี่ยวกับ 'สถานที่หรือช่วงเวลาจัดงานผีตาโขน' มาด้วยตนเอง 1 ประโยค", minLen: 20, requiredKeywords: ["เลย", "ด่านซ้าย", "เดือน"], type: "boss" },
        40: { text: "ภารกิจ: นักสืบจงพิมพ์สร้างประโยค 'ข้อคิดเห็น' เกี่ยวกับ 'ลวดลายและสีสันของหน้ากากผีตาโขน' มาด้วยตนเอง 1 ประโยค", minLen: 20, requiredKeywords: ["น่ากลัว", "เท่", "สวย", "แปลก", "ชอบ"], type: "boss" },
        50: { text: "ภารกิจ: เพื่อปิดคดีข่าวลือนี้ นักสืบจงอธิบายสรุปมาว่า 'ข้อเท็จจริง' และ 'ข้อคิดเห็น' แตกต่างกันอย่างไร?", minLen: 40, requiredKeywords: [], type: "final" }
    };
    // แผนที่ 30 ช่อง กำหนดสี 0=เขียว(ข้อเท็จจริง/คิดเห็น) ,1=เหลือง(แปลงสาร) ,2=แดง(บอส checkpoint)
    const boardCells = Array.from({length:30}, (_,i)=> {
        let type = "green"; // ข้อเท็จจริง/คิดเห็น
        if(i===9 || i===19 || i===29) type="boss";     // ช่องบอสพิเศษ 10,20,30
        else if((i+1) % 7 === 0) type="yellow";
        else if((i+1) % 5 === 0) type="red";
        else type="green";
        return { id:i, type, position:i+1 };
    });

    let players = [
        { id:0, name:"🧑‍🕵️ นักสืบเอิร์ธ", avatar:"🌏", position:0, score:0, answersLog:[] },
        { id:1, name:"👩‍🕵️ นักสืบน้ำ", avatar:"💧", position:0, score:0, answersLog:[] },
        { id:2, name:"🧑‍🕵️ นักสืบไฟ", avatar:"🔥", position:0, score:0, answersLog:[] },
        { id:3, name:"👩‍🕵️ นักสืบลม", avatar:"🍃", position:0, score:0, answersLog:[] }
    ];
    let currentPlayerIdx = 0;
    let gameActive = true;
    let waitingForQuestion = false;     // กำลังรอตอบ modal
    let currentQuestionData = null;     // เก็บข้อมูลการ์ดที่กำลังถาม
    let currentCellType = null;
    let currentAttempt = 0;
    let currentHintUsed = false;
    let pendingMoveSteps = 0;            // หลังจากตอบเสร็จค่อยเดิน
        
    // Helper สุ่มการ์ดตามประเภท
    function getRandomCardByType(type) {
        if(type === "green") {
            let idx = Math.floor(Math.random() * factOpinionCards.length);
            return { category:"green", data: factOpinionCards[idx], mode:"factOpinion" };
        } else if(type === "yellow") {
            let idx = Math.floor(Math.random() * transformCards.length);
            return { category:"yellow", data: transformCards[idx], mode:"transform" };
        } else if(type === "boss") {
            let posNum = currentPlayerPosition() + 1;
            let bossKey = [10,20,30].includes(posNum) ? posNum : (posNum===30?30:10);
            let bossData = bossCards[bossKey];
            if(!bossData) bossData = bossCards[10];
            return { category:"boss", data: bossData, mode:"boss", bossPos:bossKey };
        }
        return null;
    }
    function currentPlayerPosition() { return players[currentPlayerIdx].position; }
    
    // แสดง modal ถาม
    function showQuestionModal(questionObj, cellType) {
        waitingForQuestion = true;
        currentAttempt = 0;
        currentHintUsed = false;
        currentQuestionData = questionObj;
        currentCellType = cellType;
        let modalDiv = document.createElement("div");
        modalDiv.className = "modal";
        let headerText = "";
        if(questionObj.mode === "factOpinion") headerText = "🔍 เครื่องจับเท็จ";
        else if(questionObj.mode === "transform") headerText = "⚡ ช่างแปลงสาร";
        else headerText = "📁 แฟ้มลับนักสืบ";
        let questionHtml = `<div class="modal-card"><span class="close-icon" onclick="this.closest('.modal').remove()">✖</span><h3>${headerText}</h3>`;
        if(questionObj.mode === "factOpinion") {
            questionHtml += `<div class="question-text">📜 ${questionObj.data.text}<br>👉 พิมพ์ "ข้อเท็จจริง" หรือ "ข้อคิดเห็น"</div>`;
        } else if(questionObj.mode === "transform") {
            questionHtml += `<div class="question-text">📢 ข่าวลือ: ${questionObj.data.rumor}<br>📌 ${questionObj.data.task}</div>`;
        } else {
            questionHtml += `<div class="question-text">🎭 ${questionObj.data.text}</div>`;
        }
        questionHtml += `<input type="text" id="modalAnswerInput" class="answer-input" placeholder="พิมพ์คำตอบของคุณ...">`;
        questionHtml += `<div class="modal-buttons"><button class="btn-submit" id="submitAnswerBtn">✅ ยืนยันคำตอบ</button>`;
        questionHtml += `<button class="btn-hint" id="hintBtn">💡 ขอคำใบ้ (หัก 2 คะแนน)</button></div>`;
        questionHtml += `<div id="hintMessage" class="attempt-hint"></div></div>`;
        modalDiv.innerHTML = questionHtml;
        document.body.appendChild(modalDiv);
        document.getElementById("submitAnswerBtn").onclick = () => checkAnswer(modalDiv);
        document.getElementById("hintBtn").onclick = () => giveHint(modalDiv);
        document.getElementById("modalAnswerInput").focus();
    }
    
    function giveHint(modalDiv) {
        if(currentHintUsed) { alert("ใช้คำใบ้ไปแล้วสำหรับข้อนี้"); return; }
        if(players[currentPlayerIdx].score < 2 && players[currentPlayerIdx].score>0) { 
            alert("คะแนนไม่พอหัก 2 คะแนน"); 
            return; 
        }
        let hintMsg = "";
        if(currentQuestionData.mode === "factOpinion") {
            hintMsg = "💬 คำใบ้: ให้ดูว่าประโยคนั้นเป็นความจริงที่พิสูจน์ได้ หรือเป็นความรู้สึกส่วนตัว";
        } else if(currentQuestionData.mode === "transform") {
            hintMsg = `🔎 คำใบ้: คำตอบเกี่ยวข้องกับ ${currentQuestionData.data.keywords.slice(0,2).join(", ")}`;
        } else {
            hintMsg = `📝 คำใบ้: ควรมีความยาวอย่างน้อย ${currentQuestionData.data.minLen} ตัวอักษร และมีคำสำคัญบางคำ`;
        }
        players[currentPlayerIdx].score = Math.max(0, players[currentPlayerIdx].score - 2);
        currentHintUsed = true;
        document.getElementById("hintMessage").innerText = hintMsg + " (หัก 2 คะแนน)";
        updateUI();
    }
    
    function checkAnswer(modalDiv) {
        let answer = document.getElementById("modalAnswerInput").value.trim();
        if(answer === "") { alert("กรุณาพิมพ์คำตอบ"); return; }
        let isCorrect = false;
        let pointEarn = 5;
        let logEntry = { question: "", answer: answer, result: false, scoreAdd:0, timestamp: new Date().toLocaleString() };
        if(currentQuestionData.mode === "factOpinion") {
            let correctKw = currentQuestionData.data.answerKeywords;
            isCorrect = correctKw.some(kw => answer.toLowerCase().includes(kw.toLowerCase()));
            if(isCorrect) pointEarn = 10;
        } 
        else if(currentQuestionData.mode === "transform") {
            let keywords = currentQuestionData.data.keywords;
            isCorrect = keywords.some(kw => answer.toLowerCase().includes(kw.toLowerCase()));
            if(isCorrect) pointEarn = 10;
        }
        else if(currentQuestionData.mode === "boss") {
            let data = currentQuestionData.data;
            if(answer.length >= data.minLen) {
                if(data.requiredKeywords.length === 0) isCorrect = true;
                else isCorrect = data.requiredKeywords.some(kw => answer.toLowerCase().includes(kw.toLowerCase()));
            } else { isCorrect = false; }
            pointEarn = 15;
        }
        if(isCorrect) {
            players[currentPlayerIdx].score += pointEarn;
            logEntry.result = true; logEntry.scoreAdd = pointEarn;
            logEntry.question = currentQuestionData.mode==="factOpinion"?currentQuestionData.data.text:(currentQuestionData.mode==="transform"?currentQuestionData.data.rumor:currentQuestionData.data.text);
            players[currentPlayerIdx].answersLog.push(logEntry);
            modalDiv.remove();
            waitingForQuestion = false;
            // เดินตามจำนวนเต๋าที่ค้างไว้
            movePlayerAfterQuestion();
            updateUI();
            checkGameWin();
        } else {
            currentAttempt++;
            alert(`❌ คำตอบยังไม่ถูกต้อง! ลองใหม่ (ครั้งที่ ${currentAttempt})`);
            if(currentAttempt >= 2 && !currentHintUsed) {
                document.getElementById("hintMessage").innerHTML = "💡 ลองกดปุ่ม ขอคำใบ้ เพื่อช่วยเหลือ!";
            }
            if(currentAttempt >= 3) {
                alert("ผ่านข้อนี้แบบใช้ความช่วยเหลืออัตโนมัติ (ไม่ได้รับคะแนน)");
                logEntry.result = false; logEntry.scoreAdd = 0;
                logEntry.question = currentQuestionData.mode==="factOpinion"?currentQuestionData.data.text:(currentQuestionData.mode==="transform"?currentQuestionData.data.rumor:currentQuestionData.data.text);
                players[currentPlayerIdx].answersLog.push(logEntry);
                modalDiv.remove();
                waitingForQuestion = false;
                movePlayerAfterQuestion();
                updateUI();
                checkGameWin();
            }
        }
        updateUI();
    }
    
    let pendingSteps = 0;
    function movePlayerAfterQuestion() {
        if(pendingSteps <= 0) {
            nextTurn();
            return;
        }
        let newPos = players[currentPlayerIdx].position + pendingSteps;
        if(newPos >= 30) newPos = 30;
        players[currentPlayerIdx].position = newPos;
        pendingSteps = 0;
        updateUI();
        // หลังเดินจบเช็คช่องอีกที ถ้าช่องบอสหรือช่องอื่นแล้วยังไม่ได้ตอบ? ไม่ต้อง เพราะเพิ่งตอบมา
        // แต่ถ้าตกช่องพิเศษให้ตอบอีกรอบ? ตามกติกา: เดินไปตกช่องใหม่ ต้องตอบคำถามใหม่ 
        handleLandOnCell();
    }
    
    function handleLandOnCell() {
        let pos = players[currentPlayerIdx].position;
        let cell = boardCells[pos];
        if(!cell) { nextTurn(); return; }
        let cardObj = getRandomCardByType(cell.type);
        if(cardObj) showQuestionModal(cardObj, cell.type);
        else nextTurn();
    }
    
    function rollDice() {
        if(waitingForQuestion) { alert("กรุณาตอบคำถามให้เสร็จก่อน!"); return; }
        if(!gameActive) return;
        let dice = Math.floor(Math.random() * 6) + 1;
        document.getElementById("diceResult").innerText = dice;
        pendingSteps = dice;
        let oldPos = players[currentPlayerIdx].position;
        let newPosTemp = oldPos + dice;
        if(newPosTemp > 30) newPosTemp = 30;
        // เอาไว้ตอบคำถามก่อนค่อยเคลื่อนที่
        // แต่ก่อนตอบให้เช็คช่องปลายทางที่กำลังจะไป
        players[currentPlayerIdx].position = newPosTemp;
        let targetCell = boardCells[players[currentPlayerIdx].position];
        players[currentPlayerIdx].position = oldPos;  // กลับก่อนตอบ
        let cardTemp = getRandomCardByType(targetCell.type);
        if(cardTemp) {
            showQuestionModal(cardTemp, targetCell.type);
        } else {
            // ถ้าไม่มี modal เลยก็เดินจริง
            players[currentPlayerIdx].position = newPosTemp;
            updateUI();
            if(players[currentPlayerIdx].position === 29 || players[currentPlayerIdx].position === 30) checkGameWin();
            nextTurn();
        }
        updateUI();
    }
    
    function nextTurn() {
        if(waitingForQuestion) return;
        if(players[currentPlayerIdx].position >= 30) {
            gameActive = false;
            document.getElementById("gameStatusMsg").innerText = "🎉 จบเกม! ผู้เล่นถึงวัดโพนชัยแล้ว 🎉";
            return;
        }
        currentPlayerIdx = (currentPlayerIdx + 1) % 4;
        while(players[currentPlayerIdx].position >= 30 && gameActive) {
            currentPlayerIdx = (currentPlayerIdx + 1) % 4;
            if(players.every(p=>p.position>=30)) { gameActive=false; break; }
        }
        updateUI();
        document.getElementById("gameStatusMsg").innerText = `🎭 เทิร์นของ ${players[currentPlayerIdx].name} 🎭`;
    }
    
    function checkGameWin() {
        if(players[currentPlayerIdx].position >= 30) {
            gameActive = false;
            document.getElementById("gameStatusMsg").innerHTML = "🏆 ผู้เล่นถึงวัดโพนชัย เกมจบ 🏆";
            return true;
        }
        return false;
    }
    
    // export CSV
    function exportCSV() {
        let rows = [["ผู้เล่น","คะแนนรวม","คำถาม","คำตอบที่พิมพ์","ถูก/ผ่าน","คะแนนที่ได้","เวลา"]];
        for(let p of players) {
            for(let log of p.answersLog) {
                rows.push([p.name, p.score, log.question, log.answer, log.result?"✅ผ่าน":"❌ไม่ผ่าน", log.scoreAdd, log.timestamp]);
            }
            if(p.answersLog.length===0) rows.push([p.name, p.score, "ไม่มีคำตอบ", "-","-","-","-"]);
        }
        let csv = rows.map(row => row.map(cell => `"${cell}"`).join(",")).join("\n");
        let blob = new Blob(["\uFEFF" + csv], {type:"text/csv;charset=utf-8;"});
        let link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "phi_takhon_report.csv";
        link.click();
    }
    
    function resetGame() {
        players.forEach(p=> { p.position=0; p.score=0; p.answersLog=[]; });
        currentPlayerIdx = 0; gameActive=true; waitingForQuestion=false; pendingSteps=0;
        if(document.querySelector(".modal")) document.querySelector(".modal").remove();
        updateUI();
        document.getElementById("gameStatusMsg").innerText = "🔄 เริ่มเกมใหม่! กดทอยลูกเต๋า";
    }
    
    function updateUI() {
        // players panel
        let panel = document.getElementById("playersPanel");
        panel.innerHTML = players.map((p,idx)=> `<div class="player-card ${idx===currentPlayerIdx && gameActive ? 'active-turn':''}">
            <div class="player-name"><span class="avatar-icon">${p.avatar}</span> ${p.name}</div>
            <div class="player-score">⭐ ${p.score} คะแนน</div>
            <div class="player-position">📍 ช่อง ${p.position+1}/30</div>
        </div>`).join("");
        // draw board
        let boardHtml = "";
        for(let i=0;i<boardCells.length;i+=10) {
            let row = boardCells.slice(i,i+10);
            boardHtml += `<div class="track">`+row.map(cell=> {
                let avatarHere = players.filter(p=>p.position === cell.id).map(p=>p.avatar).join("");
                let cellClass = `cell `;
                if(cell.type==="green") cellClass+="green-cell";
                else if(cell.type==="yellow") cellClass+="yellow-cell";
                else if(cell.type==="boss") cellClass+="boss-cell";
                else cellClass+="red-cell";
                return `<div class="${cellClass}"><span class="number">${cell.position}</span><div class="avatars-on-cell">${avatarHere}</div></div>`;
            }).join("")+`</div>`;
        }
        document.getElementById("boardContainer").innerHTML = boardHtml;
        let diceBtn = document.getElementById("rollDiceBtn");
        diceBtn.disabled = waitingForQuestion || !gameActive;
        if(!gameActive) diceBtn.disabled=true;
    }
    
    document.getElementById("rollDiceBtn").onclick = rollDice;
    document.getElementById("exportCSVBtn").onclick = exportCSV;
    document.getElementById("resetGameBtn").onclick = resetGame;
    updateUI();
</script>
</body>
</html>
